<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Meadow (2D Platformer Arena)</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 📱 데스크톱 화면 중앙에 띄울 모바일 기기 목업 래퍼 -->
  <div class="mockup-wrapper">
    <div class="mobile-mockup">
      <!-- 스마트폰 수화기/카메라 스피커 데코 -->
      <div class="phone-speaker"></div>

      <!-- 🔐 1단계: 로그인 화면 -->
      <div id="login-screen" class="screen-container">
        <div class="login-card">
          <header class="login-header">
            <span class="login-logo">🌱</span>
            <h2>Slack Meadow</h2>
            <p>슬랙 이모지 반응자를 소환해 달리기를 시작해보세요.</p>
          </header>
          <form id="login-form">
            <div class="form-group">
              <label for="login-token">Slack User Token</label>
              <input 
                type="password" 
                id="login-token" 
                placeholder="xoxp-, xoxs- 또는 xoxc- 토큰 입력" 
                required
                autocomplete="current-password"
              >
            </div>
            <div class="form-group hidden" id="login-cookie-group">
              <label for="login-cookie">Session Cookie 'd'</label>
              <input 
                type="password" 
                id="login-cookie" 
                placeholder="xoxd- 로 시작하는 슬랙 d 쿠키 입력"
                autocomplete="off"
              >
            </div>
            <button type="submit" id="login-submit-btn" class="btn-primary">
              <span class="btn-text">슬랙 연결하기</span>
              <div class="spinner hidden"></div>
            </button>
          </form>
          <div id="login-status" class="status-container hidden">
            <div id="login-status-message" class="status-message"></div>
          </div>
        </div>
      </div>

      <!-- 🍀 2단계: 메인 서비스 화면 -->
      <div id="main-screen" class="screen-container hidden">
        
        <!-- 모바일 화면 전체를 뒤덮는 화이트 맵 초원 -->
        <div class="meadow-canvas-full" id="meadow-canvas">
          
          <!-- 🌲 v18: 시차(Parallax) 스크롤용 배경 나무 레이어 -->
          <div class="parallax-trees-container" id="parallax-trees">
            <div class="parallax-tree tree-1">🌲</div>
            <div class="parallax-tree tree-2">🌳</div>
            <div class="parallax-tree tree-3">🌲</div>
            <div class="parallax-tree tree-4">🌳</div>
            <div class="parallax-tree tree-5">🌲</div>
            <div class="parallax-tree tree-6">🌳</div>
            <div class="parallax-tree tree-7">🌲</div>
            <div class="parallax-tree tree-8">🌳</div>
          </div>

          <!-- 🎥 시네마틱 가로 추적 LERP 패닝 & Dynamic Zoom 적용 카메라 스테이지 -->
          <div id="camera-stage" class="camera-stage-wrapper">
            
            <!-- 🏟️ v18/19/20: 2D 수평 횡스크롤 트랙 경기장 -->
            <div class="stadium-stage-2d">
              <div class="stadium-plate-2d">
                <!-- 가로 직선 레인 라인 4줄 -->
                <div class="straight-lane-line line-1"></div>
                <div class="straight-lane-line line-2"></div>
                <div class="straight-lane-line line-3"></div>
                <div class="straight-lane-line line-4"></div>
                
                <!-- 출발선 세로 라인 -->
                <div class="start-line-straight-2d"></div>
                <!-- 결승선 세로 라인 (v20: 2500px 지점) -->
                <div class="finish-line-straight-2d"></div>

                <!-- 결승선 2D 피니시 아치 (v20: 2500px 지점) -->
                <div class="finish-gate-2d">
                  <div class="gate-bar">FINISH</div>
                </div>
              </div>
            </div>

            <!-- 졸라맨 캐릭터들이 뛰어놀 공간 -->
            <div id="character-container" class="character-container-full"></div>
          </div>

          <!-- 🎙️ 실시간 경기 중계 오버레이 자막 바 + ⏩ 바로 결과보기 스킵 버튼 -->
          <div id="race-commentary" class="race-commentary-bar hidden">
            <div class="commentary-content-row">
              <span class="commentary-icon">🎙️</span>
              <span id="commentary-text" class="commentary-text">준비 완료...</span>
            </div>
            <button id="btn-skip-race" class="btn-skip-race">⏩ 바로 결과보기</button>
          </div>

          <!-- 3D 카운트다운 오버레이 -->
          <div id="race-countdown" class="race-countdown-overlay hidden">
            <span class="countdown-num">3</span>
          </div>

        </div>

        <!-- 🎛️ 스마트폰 하단 35%에 걸쳐 항상 노출되는 슬라이딩 바텀 시트 -->
        <div class="bottom-sheet" id="bottom-sheet">
          <!-- 쓸어 올리기 / 클릭용 핸들바 -->
          <div class="bottom-sheet-handle" id="bottom-sheet-handle">
            <div class="handle-bar"></div>
          </div>

          <!-- 본문 위젯 영역 -->
          <div class="panel-body">
            
            <!-- 🎥 가로 3단 슬라이더 구조 스테이지 -->
            <div class="slider-container" id="slider-container">
              <div class="slider-wrapper" id="slider-wrapper">
                
                <!-- 슬라이드 패널 1: 슬랙메시지 분석 및 소환 제어 -->
                <div class="slide-panel" id="slide-1">
                  <!-- 헤더 -->
                  <header class="panel-header">
                    <div class="logo-row">
                      <div class="logo">
                        <span class="emoji-logo">🌱</span>
                        <h1>Slack Meadow</h1>
                      </div>
                      <button id="logout-btn" class="btn-logout" title="로그아웃">로그아웃</button>
                    </div>
                    <p class="panel-subtitle">이모지 반응자를 소환해 달리기를 시작해보세요.</p>
                  </header>

                  <!-- 1. 분석 입력창 -->
                  <section class="panel-card input-card">
                    <h3>슬랙 링크 분석</h3>
                    <form id="analyzer-form">
                      <div class="form-group">
                        <input 
                          type="url" 
                          id="slack-url" 
                          placeholder="슬랙 메시지 링크 입력..." 
                          required
                        >
                      </div>
                      <button type="submit" id="submit-btn" class="btn-primary">
                        <span class="btn-text">이모지 가져오기</span>
                        <div class="spinner hidden"></div>
                      </button>
                    </form>
                    <div id="status-container" class="status-container hidden">
                      <div id="status-message" class="status-message"></div>
                    </div>
                  </section>

                  <!-- 2. 분석 결과 (이모지 및 반응자 리스트) -->
                  <section id="result-section" class="panel-card result-card hidden">
                    <div class="message-info">
                      <div class="user-profile">
                        <img id="message-avatar" src="" alt="Avatar" class="avatar">
                        <div class="user-meta">
                          <span id="message-author" class="username">작성자</span>
                          <span id="message-time" class="timestamp">시간</span>
                        </div>
                      </div>
                      <!-- 💬 v18: 숏코드 이모지 파싱 대응을 위해 innerHTML 처리 -->
                      <p id="message-text" class="message-content"></p>
                    </div>

                    <div class="emoji-filters-container">
                      <div class="emoji-filters-header">
                        <h4>이모지 선택</h4>
                        <!-- 전체 선택 체크박스 -->
                        <label class="select-all-wrapper">
                          <input type="checkbox" id="select-all-emojis">
                          <span>전체 선택</span>
                        </label>
                      </div>
                      <div id="emoji-filter-chips" class="emoji-filter-chips"></div>
                    </div>

                    <div id="selected-emoji-detail" class="selected-emoji-detail hidden">
                      <div class="emoji-detail-header">
                        <span id="detail-emoji-badge" class="emoji-badge">👍</span>
                        <span id="detail-emoji-count" class="count-label">0명</span>
                        <button id="add-to-feedback-btn" class="btn-success">초원 소환</button>
                      </div>
                      <div id="detail-user-list" class="detail-user-list"></div>
                    </div>

                    <!-- 📊 v17/18: 고유 참가자 유저별 명단 분석 패널 -->
                    <div class="user-analysis-section">
                      <button type="button" id="btn-toggle-user-analysis" class="btn-secondary-outline">
                        📊 명단 분석 결과 보기
                      </button>
                      
                      <div id="user-analysis-panel" class="user-analysis-panel hidden">
                        <div class="analysis-header-row">
                          <span id="analysis-total-count" class="analysis-count-badge">총 0명</span>
                          <button type="button" id="btn-copy-spaced-names" class="btn-success-sm">
                            📋 명단 복사 (스페이스 구분)
                          </button>
                        </div>
                        <div id="analysis-user-list" class="analysis-user-list">
                          <!-- 유저별 단 이모지 목록 동적 주입 -->
                        </div>
                      </div>
                    </div>

                  </section>
                </div>

                <!-- 슬라이드 패널 2: 경기 모드 설정 및 명단 제어 -->
                <div class="slide-panel" id="slide-2">
                  <!-- 슬라이드 2 네비게이션 헤더 -->
                  <header class="slide-header-nav">
                    <button id="btn-prev-slide" class="btn-prev-slide">⬅️ 추가 소환하기</button>
                    <button id="logout-btn-2" class="btn-logout" title="로그아웃">로그아웃</button>
                  </header>

                  <!-- 3. 피드백 목록 (경주 명단 및 경주 제어) -->
                  <section class="panel-card feedback-card">
                    <div class="feedback-card-header">
                      <h3>경주 명단</h3>
                      <div class="header-actions">
                        <button id="select-all-runners-btn" class="btn-action-xs">전체선택</button>
                        <button id="delete-all-runners-btn" class="btn-action-xs btn-danger-xs">전체삭제</button>
                        <!-- 🏁 경주 시작 버튼 -->
                        <button id="start-race-btn" class="btn-race hidden">🏁 경주 시작!</button>
                      </div>
                    </div>

                    <!-- 🎮 경기 모드 및 인원수 선택 패널 -->
                    <div class="game-mode-panel" id="game-mode-panel">
                      <div class="mode-tab-row">
                        <label class="mode-tab-label">
                          <input type="radio" name="game-mode" value="podium" checked>
                          <span class="mode-tab-btn">🏆 선착순</span>
                        </label>
                        <label class="mode-tab-label">
                          <input type="radio" name="game-mode" value="group">
                          <span class="mode-tab-btn">👥 조 짜기</span>
                        </label>
                      </div>
                      
                      <div class="mode-config-row">
                        <!-- 선착순 설정창 -->
                        <div class="config-item" id="config-podium">
                          <span class="config-label">당첨 인원 수</span>
                          <input type="number" id="winner-count-input" min="1" max="10" value="1">
                        </div>
                        <!-- 조 짜기 설정창 -->
                        <div class="config-item hidden" id="config-group">
                          <span class="config-label">나눌 조 개수</span>
                          <input type="number" id="team-count-input" min="2" max="4" value="2">
                        </div>
                      </div>
                    </div>

                    <div id="feedback-list-container" class="feedback-list-container">
                      <p class="empty-text">소환된 유저가 없습니다. 슬랙 메시지를 분석해 소환해보세요!</p>
                    </div>
                  </section>
                </div>

                <!-- 👑 슬라이드 패널 3: 최종 랭킹 결과창 -->
                <div class="slide-panel" id="slide-3">
                  <header class="slide-header-nav">
                    <h3 class="result-nav-title">👑 최종 경기 결과</h3>
                    <button id="logout-btn-3" class="btn-logout" title="로그아웃">로그아웃</button>
                  </header>

                  <section class="panel-card result-ranking-card">
                    <!-- 🏆 선착순 랭킹 리스트 뷰포트 -->
                    <div id="ranking-list-view" class="ranking-list-view">
                      <!-- JS 동적 마크업 바인딩 -->
                    </div>

                    <!-- 👥 조 짜기 분할 결과 뷰포트 -->
                    <div id="group-ranking-view" class="group-result-view hidden">
                      <!-- JS 동적 마크업 바인딩 -->
                    </div>

                    <button id="ranking-confirm-btn" class="btn-primary" style="margin-top: 1rem;">확정 및 결과 닫기</button>
                  </section>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
